# 2GB was too low for :app:packageDebug (OutOfMemoryError during PackageAndroidArtifact).
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=768m -XX:+UseParallelGC
android.useAndroidX=true
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# New Architecture enabled to satisfy react-native-reanimated requirements
newArchEnabled=true
hermesEnabled=true
kotlinVersion=1.9.0

android.enableR8.fullMode=true
android.useFullClasspathForDexingTransform=true

# Environment variables for Node.js
org.gradle.env.PATH=/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin
org.gradle.env.NODE_PATH=/opt/homebrew/bin/node
